services:
  openclaw-gateway:
    image: mwaeckerlin/openclaw:gateway
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      openclaw-sandbox:
        condition: service_healthy
      allow-write-access:
        condition: service_started
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_SANDBOX_SSH_PRIVATE_KEY: ${OPENCLAW_SANDBOX_SSH_PRIVATE_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OVERWRITE_CONFIG: "true"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - gateway-sandbox

  openclaw-sandbox:
    image: mwaeckerlin/openclaw:sandbox
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    environment:
      OPENCLAW_SANDBOX_SSH_PUBLIC_KEY: ${OPENCLAW_SANDBOX_SSH_PUBLIC_KEY:-}
      DOCKER_HOST: tcp://openclaw-dind:2375
    volumes:
      - openclaw-workspace:/home/somebody
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test: ["CMD", "pgrep", "-x", "sshd"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      openclaw-dind:
        condition: service_started
    restart: unless-stopped
    networks:
      - gateway-sandbox
      - sandbox-dind

  openclaw-dind:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - openclaw-docker:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - sandbox-dind

  allow-write-access:
    image: mwaeckerlin/allow-write-access
    environment:
      ALLOW_USER: "chown -R 1000:1000"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/app

networks:
  gateway-sandbox:
  sandbox-dind:

volumes:
  openclaw-config:
  openclaw-workspace:
  openclaw-docker:
