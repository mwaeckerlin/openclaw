services:
  openclaw-gateway:
    image: mwaeckerlin/openclaw:gateway
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      openclaw-sandbox:
        condition: service_healthy
      allow-write-access:
        condition: service_started
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_SANDBOX_SSH_PRIVATE_KEY: ${OPENCLAW_SANDBOX_SSH_PRIVATE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCLAW_WHISPER_API_KEY: ${OPENCLAW_WHISPER_API_KEY:-}
      OVERWRITE_CONFIG: "true"
      OPENCLAW_STATE_DIR: ${OPENCLAW_STATE_DIR:-}
      # Feature enablement + API Keys
      OPENCLAW_ELEVENLABS_API_KEY: ${OPENCLAW_ELEVENLABS_API_KEY}
      OPENCLAW_NOTION_API_KEY: ${OPENCLAW_NOTION_API_KEY}
      OPENCLAW_GITHUB_TOKEN: ${OPENCLAW_GITHUB_TOKEN}
      OPENCLAW_GITEA_HOST: ${OPENCLAW_GITEA_HOST:-}
      OPENCLAW_GITEA_TOKEN: ${OPENCLAW_GITEA_TOKEN:-}
      OPENCLAW_GITEA_INSECURE: ${OPENCLAW_GITEA_INSECURE:-}
      OPENCLAW_TRELLO_API_KEY: ${OPENCLAW_TRELLO_API_KEY}
      OPENCLAW_TELEGRAM_BOT_TOKEN: ${OPENCLAW_TELEGRAM_BOT_TOKEN}
      OPENCLAW_DISCORD_BOT_TOKEN: ${OPENCLAW_DISCORD_BOT_TOKEN}
      OPENCLAW_SLACK_BOT_TOKEN: ${OPENCLAW_SLACK_BOT_TOKEN}
      OPENCLAW_BRAVE_API_KEY: ${OPENCLAW_BRAVE_API_KEY}
      # LiteLLM
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_URL: ${LITELLM_URL}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      # Agent defaults
      OPENCLAW_PRIMARY_MODEL: ${OPENCLAW_PRIMARY_MODEL:-openai/gpt-5.4}
      OPENCLAW_AGENT_SCOPE: ${OPENCLAW_AGENT_SCOPE}
      OPENCLAW_DM_SCOPE: ${OPENCLAW_DM_SCOPE}
      OPENCLAW_SESSION_VISIBILITY: ${OPENCLAW_SESSION_VISIBILITY}
      OPENCLAW_SESSION_TOOLS_VISIBILITY: ${OPENCLAW_SESSION_TOOLS_VISIBILITY}
      OPENCLAW_HEARTBEAT_INTERVAL: ${OPENCLAW_HEARTBEAT_INTERVAL}
      OPENCLAW_TIMEOUT_SECONDS: ${OPENCLAW_TIMEOUT_SECONDS}
      OPENCLAW_MAX_CONCURRENT: ${OPENCLAW_MAX_CONCURRENT}
      OPENCLAW_CRON_ENABLED: ${OPENCLAW_CRON_ENABLED}
      OPENCLAW_BASE_PATH: ${OPENCLAW_BASE_PATH}
      OPENCLAW_DEVICE_PAIRING: ${OPENCLAW_DEVICE_PAIRING}
      # Full section-level overrides for all OpenClaw config roots
      OPENCLAW_META_JSON: ${OPENCLAW_META_JSON:-}
      OPENCLAW_ENV_JSON: ${OPENCLAW_ENV_JSON:-}
      OPENCLAW_WIZARD_JSON: ${OPENCLAW_WIZARD_JSON:-}
      OPENCLAW_DIAGNOSTICS_JSON: ${OPENCLAW_DIAGNOSTICS_JSON:-}
      OPENCLAW_LOGGING_JSON: ${OPENCLAW_LOGGING_JSON:-}
      OPENCLAW_CLI_JSON: ${OPENCLAW_CLI_JSON:-}
      OPENCLAW_UPDATE_JSON: ${OPENCLAW_UPDATE_JSON:-}
      OPENCLAW_BROWSER_JSON: ${OPENCLAW_BROWSER_JSON:-}
      OPENCLAW_UI_JSON: ${OPENCLAW_UI_JSON:-}
      OPENCLAW_SECRETS_JSON: ${OPENCLAW_SECRETS_JSON:-}
      OPENCLAW_AUTH_JSON: ${OPENCLAW_AUTH_JSON:-}
      OPENCLAW_ACP_JSON: ${OPENCLAW_ACP_JSON:-}
      OPENCLAW_MODELS_JSON: ${OPENCLAW_MODELS_JSON:-}
      OPENCLAW_NODE_HOST_JSON: ${OPENCLAW_NODE_HOST_JSON:-}
      OPENCLAW_AGENTS_JSON: ${OPENCLAW_AGENTS_JSON:-}
      OPENCLAW_TOOLS_JSON: ${OPENCLAW_TOOLS_JSON:-}
      OPENCLAW_BINDINGS_JSON: ${OPENCLAW_BINDINGS_JSON:-}
      OPENCLAW_BROADCAST_JSON: ${OPENCLAW_BROADCAST_JSON:-}
      OPENCLAW_AUDIO_JSON: ${OPENCLAW_AUDIO_JSON:-}
      OPENCLAW_MEDIA_JSON: ${OPENCLAW_MEDIA_JSON:-}
      OPENCLAW_MESSAGES_JSON: ${OPENCLAW_MESSAGES_JSON:-}
      OPENCLAW_COMMANDS_JSON: ${OPENCLAW_COMMANDS_JSON:-}
      OPENCLAW_APPROVALS_JSON: ${OPENCLAW_APPROVALS_JSON:-}
      OPENCLAW_SESSION_JSON: ${OPENCLAW_SESSION_JSON:-}
      OPENCLAW_CRON_JSON: ${OPENCLAW_CRON_JSON:-}
      OPENCLAW_HOOKS_JSON: ${OPENCLAW_HOOKS_JSON:-}
      OPENCLAW_WEB_JSON: ${OPENCLAW_WEB_JSON:-}
      OPENCLAW_CHANNELS_JSON: ${OPENCLAW_CHANNELS_JSON:-}
      OPENCLAW_DISCOVERY_JSON: ${OPENCLAW_DISCOVERY_JSON:-}
      OPENCLAW_CANVAS_HOST_JSON: ${OPENCLAW_CANVAS_HOST_JSON:-}
      OPENCLAW_TALK_JSON: ${OPENCLAW_TALK_JSON:-}
      OPENCLAW_GATEWAY_JSON: ${OPENCLAW_GATEWAY_JSON:-}
      OPENCLAW_MEMORY_JSON: ${OPENCLAW_MEMORY_JSON:-}
      OPENCLAW_MCP_JSON: ${OPENCLAW_MCP_JSON:-}
      OPENCLAW_SKILLS_JSON: ${OPENCLAW_SKILLS_JSON:-}
      OPENCLAW_PLUGINS_JSON: ${OPENCLAW_PLUGINS_JSON:-}
      OPENCLAW_PLUGIN_ENTRIES_JSON: ${OPENCLAW_PLUGIN_ENTRIES_JSON:-}
      PLUGINS: ${PLUGINS:-}
      # Individual overrides for template defaults
      OPENCLAW_LOGGING_LEVEL: ${OPENCLAW_LOGGING_LEVEL:-}
      OPENCLAW_AUTH_PROFILE_PROVIDER: ${OPENCLAW_AUTH_PROFILE_PROVIDER:-}
      OPENCLAW_AUTH_PROFILE_MODE: ${OPENCLAW_AUTH_PROFILE_MODE:-}
      OPENCLAW_MODELS_MODE: ${OPENCLAW_MODELS_MODE:-}
      OPENCLAW_LITELLM_API: ${OPENCLAW_LITELLM_API:-}
      OPENCLAW_LITELLM_MODELS_JSON: ${OPENCLAW_LITELLM_MODELS_JSON:-}
      OPENCLAW_OPENAI_BASE_URL: ${OPENCLAW_OPENAI_BASE_URL:-}
      OPENCLAW_OPENAI_MODELS_JSON: ${OPENCLAW_OPENAI_MODELS_JSON:-}
      OPENCLAW_AGENT_SANDBOX_MODE: ${OPENCLAW_AGENT_SANDBOX_MODE:-}
      OPENCLAW_AGENT_WORKSPACE_ACCESS: ${OPENCLAW_AGENT_WORKSPACE_ACCESS:-}
      OPENCLAW_AGENT_MODELS_JSON: ${OPENCLAW_AGENT_MODELS_JSON:-}
      OPENCLAW_SUBAGENT_TIMEOUT_SECONDS: ${OPENCLAW_SUBAGENT_TIMEOUT_SECONDS:-}
      OPENCLAW_SUBAGENT_MAX_CONCURRENT: ${OPENCLAW_SUBAGENT_MAX_CONCURRENT:-}
      OPENCLAW_TOOLS_FS_WORKSPACE_ONLY: ${OPENCLAW_TOOLS_FS_WORKSPACE_ONLY:-}
      OPENCLAW_LOOP_DETECTION_ENABLED: ${OPENCLAW_LOOP_DETECTION_ENABLED:-}
      OPENCLAW_LOOP_DETECTION_WARNING_THRESHOLD: ${OPENCLAW_LOOP_DETECTION_WARNING_THRESHOLD:-}
      OPENCLAW_LOOP_DETECTION_CRITICAL_THRESHOLD: ${OPENCLAW_LOOP_DETECTION_CRITICAL_THRESHOLD:-}
      OPENCLAW_LOOP_DETECTION_GLOBAL_CIRCUIT_BREAKER_THRESHOLD: ${OPENCLAW_LOOP_DETECTION_GLOBAL_CIRCUIT_BREAKER_THRESHOLD:-}
      OPENCLAW_MEDIA_AUDIO_ENABLED: ${OPENCLAW_MEDIA_AUDIO_ENABLED:-}
      OPENCLAW_MEDIA_AUDIO_ECHO_TRANSCRIPT: ${OPENCLAW_MEDIA_AUDIO_ECHO_TRANSCRIPT:-}
      OPENCLAW_MEDIA_AUDIO_PROVIDER: ${OPENCLAW_MEDIA_AUDIO_PROVIDER:-}
      OPENCLAW_MEDIA_AUDIO_MODEL: ${OPENCLAW_MEDIA_AUDIO_MODEL:-}
      OPENCLAW_TTS_AUTO: ${OPENCLAW_TTS_AUTO:-}
      OPENCLAW_TTS_PROVIDER: ${OPENCLAW_TTS_PROVIDER:-}
      OPENCLAW_TTS_MODEL_OVERRIDES_ENABLED: ${OPENCLAW_TTS_MODEL_OVERRIDES_ENABLED:-}
      OPENCLAW_MESSAGES_QUEUE_DEBOUNCE_MS: ${OPENCLAW_MESSAGES_QUEUE_DEBOUNCE_MS:-}
      OPENCLAW_MESSAGES_QUEUE_CAP: ${OPENCLAW_MESSAGES_QUEUE_CAP:-}
      OPENCLAW_COMMANDS_NATIVE: ${OPENCLAW_COMMANDS_NATIVE:-}
      OPENCLAW_COMMANDS_NATIVE_SKILLS: ${OPENCLAW_COMMANDS_NATIVE_SKILLS:-}
      OPENCLAW_COMMANDS_RESTART: ${OPENCLAW_COMMANDS_RESTART:-}
      OPENCLAW_COMMANDS_OWNER_DISPLAY: ${OPENCLAW_COMMANDS_OWNER_DISPLAY:-}
      OPENCLAW_HOOKS_INTERNAL_ENABLED: ${OPENCLAW_HOOKS_INTERNAL_ENABLED:-}
      OPENCLAW_HOOKS_COMMAND_LOGGER_ENABLED: ${OPENCLAW_HOOKS_COMMAND_LOGGER_ENABLED:-}
      OPENCLAW_HOOKS_SESSION_MEMORY_ENABLED: ${OPENCLAW_HOOKS_SESSION_MEMORY_ENABLED:-}
      OPENCLAW_HOOKS_BOOTSTRAP_EXTRA_FILES_ENABLED: ${OPENCLAW_HOOKS_BOOTSTRAP_EXTRA_FILES_ENABLED:-}
      OPENCLAW_HOOKS_BOOT_MD_ENABLED: ${OPENCLAW_HOOKS_BOOT_MD_ENABLED:-}
      OPENCLAW_TELEGRAM_DM_POLICY: ${OPENCLAW_TELEGRAM_DM_POLICY:-}
      OPENCLAW_TELEGRAM_ALLOW_FROM_JSON: ${OPENCLAW_TELEGRAM_ALLOW_FROM_JSON:-}
      OPENCLAW_TELEGRAM_GROUPS_JSON: ${OPENCLAW_TELEGRAM_GROUPS_JSON:-}
      OPENCLAW_TELEGRAM_GROUP_POLICY: ${OPENCLAW_TELEGRAM_GROUP_POLICY:-}
      OPENCLAW_TELEGRAM_STREAMING_MODE: ${OPENCLAW_TELEGRAM_STREAMING_MODE:-}
      OPENCLAW_DISCORD_DM_POLICY: ${OPENCLAW_DISCORD_DM_POLICY:-}
      OPENCLAW_DISCORD_ALLOW_FROM_JSON: ${OPENCLAW_DISCORD_ALLOW_FROM_JSON:-}
      OPENCLAW_DISCORD_STREAMING_MODE: ${OPENCLAW_DISCORD_STREAMING_MODE:-}
      OPENCLAW_SLACK_APP_TOKEN: ${OPENCLAW_SLACK_APP_TOKEN:-}
      OPENCLAW_SLACK_DM_POLICY: ${OPENCLAW_SLACK_DM_POLICY:-}
      OPENCLAW_SLACK_ALLOW_FROM_JSON: ${OPENCLAW_SLACK_ALLOW_FROM_JSON:-}
      OPENCLAW_SLACK_NATIVE_TRANSPORT: ${OPENCLAW_SLACK_NATIVE_TRANSPORT:-}
      OPENCLAW_SLACK_STREAMING_MODE: ${OPENCLAW_SLACK_STREAMING_MODE:-}
      OPENCLAW_WHATSAPP_ENABLED: ${OPENCLAW_WHATSAPP_ENABLED:-}
      OPENCLAW_WHATSAPP_DM_POLICY: ${OPENCLAW_WHATSAPP_DM_POLICY:-}
      OPENCLAW_WHATSAPP_ALLOW_FROM_JSON: ${OPENCLAW_WHATSAPP_ALLOW_FROM_JSON:-}
      OPENCLAW_WHATSAPP_TEXT_CHUNK_LIMIT: ${OPENCLAW_WHATSAPP_TEXT_CHUNK_LIMIT:-}
      OPENCLAW_WHATSAPP_CHUNK_MODE: ${OPENCLAW_WHATSAPP_CHUNK_MODE:-}
      OPENCLAW_WHATSAPP_MEDIA_MAX_MB: ${OPENCLAW_WHATSAPP_MEDIA_MAX_MB:-}
      OPENCLAW_WHATSAPP_SEND_READ_RECEIPTS: ${OPENCLAW_WHATSAPP_SEND_READ_RECEIPTS:-}
      OPENCLAW_WHATSAPP_GROUPS_JSON: ${OPENCLAW_WHATSAPP_GROUPS_JSON:-}
      OPENCLAW_WHATSAPP_GROUP_POLICY: ${OPENCLAW_WHATSAPP_GROUP_POLICY:-}
      OPENCLAW_CHANNEL_DEFAULTS_JSON: ${OPENCLAW_CHANNEL_DEFAULTS_JSON:-}
      OPENCLAW_GOOGLECHAT_SERVICE_ACCOUNT_JSON: ${OPENCLAW_GOOGLECHAT_SERVICE_ACCOUNT_JSON:-}
      OPENCLAW_GOOGLECHAT_SERVICE_ACCOUNT_FILE: ${OPENCLAW_GOOGLECHAT_SERVICE_ACCOUNT_FILE:-}
      OPENCLAW_GOOGLECHAT_DM_ENABLED: ${OPENCLAW_GOOGLECHAT_DM_ENABLED:-}
      OPENCLAW_GOOGLECHAT_DM_POLICY: ${OPENCLAW_GOOGLECHAT_DM_POLICY:-}
      OPENCLAW_GOOGLECHAT_ALLOW_FROM_JSON: ${OPENCLAW_GOOGLECHAT_ALLOW_FROM_JSON:-}
      OPENCLAW_GOOGLECHAT_GROUP_POLICY: ${OPENCLAW_GOOGLECHAT_GROUP_POLICY:-}
      OPENCLAW_MATTERMOST_BOT_TOKEN: ${OPENCLAW_MATTERMOST_BOT_TOKEN:-}
      OPENCLAW_MATTERMOST_BASE_URL: ${OPENCLAW_MATTERMOST_BASE_URL:-}
      OPENCLAW_MATTERMOST_DM_POLICY: ${OPENCLAW_MATTERMOST_DM_POLICY:-}
      OPENCLAW_SIGNAL_ENABLED: ${OPENCLAW_SIGNAL_ENABLED:-}
      OPENCLAW_SIGNAL_ACCOUNT: ${OPENCLAW_SIGNAL_ACCOUNT:-}
      OPENCLAW_SIGNAL_DM_POLICY: ${OPENCLAW_SIGNAL_DM_POLICY:-}
      OPENCLAW_SIGNAL_ALLOW_FROM_JSON: ${OPENCLAW_SIGNAL_ALLOW_FROM_JSON:-}
      OPENCLAW_BLUEBUBBLES_DM_POLICY: ${OPENCLAW_BLUEBUBBLES_DM_POLICY:-}
      OPENCLAW_BLUEBUBBLES_SERVER_URL: ${OPENCLAW_BLUEBUBBLES_SERVER_URL:-}
      OPENCLAW_BLUEBUBBLES_PASSWORD: ${OPENCLAW_BLUEBUBBLES_PASSWORD:-}
      OPENCLAW_IMESSAGE_ENABLED: ${OPENCLAW_IMESSAGE_ENABLED:-}
      OPENCLAW_IMESSAGE_DM_POLICY: ${OPENCLAW_IMESSAGE_DM_POLICY:-}
      OPENCLAW_IMESSAGE_ALLOW_FROM_JSON: ${OPENCLAW_IMESSAGE_ALLOW_FROM_JSON:-}
      OPENCLAW_MATRIX_HOMESERVER: ${OPENCLAW_MATRIX_HOMESERVER:-}
      OPENCLAW_MATRIX_ACCESS_TOKEN: ${OPENCLAW_MATRIX_ACCESS_TOKEN:-}
      OPENCLAW_MSTEAMS_CONFIG_WRITES: ${OPENCLAW_MSTEAMS_CONFIG_WRITES:-}
      OPENCLAW_MSTEAMS_APP_ID: ${OPENCLAW_MSTEAMS_APP_ID:-}
      OPENCLAW_MSTEAMS_APP_PASSWORD: ${OPENCLAW_MSTEAMS_APP_PASSWORD:-}
      OPENCLAW_MSTEAMS_TENANT_ID: ${OPENCLAW_MSTEAMS_TENANT_ID:-}
      OPENCLAW_IRC_ENABLED: ${OPENCLAW_IRC_ENABLED:-}
      OPENCLAW_IRC_DM_POLICY: ${OPENCLAW_IRC_DM_POLICY:-}
      OPENCLAW_IRC_CONFIG_WRITES: ${OPENCLAW_IRC_CONFIG_WRITES:-}
      OPENCLAW_IRC_HOST: ${OPENCLAW_IRC_HOST:-}
      OPENCLAW_IRC_PORT: ${OPENCLAW_IRC_PORT:-}
      OPENCLAW_IRC_TLS: ${OPENCLAW_IRC_TLS:-}
      OPENCLAW_IRC_NICKSERV_ENABLED: ${OPENCLAW_IRC_NICKSERV_ENABLED:-}
      OPENCLAW_IRC_NICKSERV_SERVICE: ${OPENCLAW_IRC_NICKSERV_SERVICE:-}
      OPENCLAW_IRC_NICKSERV_PASSWORD: ${OPENCLAW_IRC_NICKSERV_PASSWORD:-}
      OPENCLAW_IRC_NICKSERV_REGISTER: ${OPENCLAW_IRC_NICKSERV_REGISTER:-}
      OPENCLAW_IRC_NICKSERV_REGISTER_EMAIL: ${OPENCLAW_IRC_NICKSERV_REGISTER_EMAIL:-}
      OPENCLAW_EXTRA_CHANNELS_JSON: ${OPENCLAW_EXTRA_CHANNELS_JSON:-}
      OPENCLAW_GATEWAY_MODE: ${OPENCLAW_GATEWAY_MODE:-}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-}
      OPENCLAW_GATEWAY_INTERNAL_PORT: ${OPENCLAW_GATEWAY_INTERNAL_PORT:-}
      OPENCLAW_GATEWAY_AUTH_MODE: ${OPENCLAW_GATEWAY_AUTH_MODE:-}
      OPENCLAW_CONTROL_UI_ENABLED: ${OPENCLAW_CONTROL_UI_ENABLED:-}
      OPENCLAW_CONTROL_UI_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: ${OPENCLAW_CONTROL_UI_ALLOW_HOST_HEADER_ORIGIN_FALLBACK:-}
      OPENCLAW_CONTROL_UI_ALLOW_INSECURE_AUTH: ${OPENCLAW_CONTROL_UI_ALLOW_INSECURE_AUTH:-}
      OPENCLAW_CONTROL_UI_DISABLE_DEVICE_AUTH: ${OPENCLAW_CONTROL_UI_DISABLE_DEVICE_AUTH:-}
      OPENCLAW_ALLOWED_ORIGINS_JSON: ${OPENCLAW_ALLOWED_ORIGINS_JSON:-}
      OPENCLAW_TAILSCALE_MODE: ${OPENCLAW_TAILSCALE_MODE:-}
      OPENCLAW_TAILSCALE_RESET_ON_EXIT: ${OPENCLAW_TAILSCALE_RESET_ON_EXIT:-}
      OPENCLAW_TRUSTED_PROXIES_JSON: ${OPENCLAW_TRUSTED_PROXIES_JSON:-}
      OPENCLAW_SKILLS_INSTALL_NODE_MANAGER: ${OPENCLAW_SKILLS_INSTALL_NODE_MANAGER:-}
      OPENCLAW_BRAVE_ENABLED: ${OPENCLAW_BRAVE_ENABLED:-}
      OPENCLAW_DUCKDUCKGO_ENABLED: ${OPENCLAW_DUCKDUCKGO_ENABLED:-}
      OPENCLAW_ACPX_ENABLED: ${OPENCLAW_ACPX_ENABLED:-}
      OPENCLAW_ACPX_GITHUB_COMMAND: ${OPENCLAW_ACPX_GITHUB_COMMAND:-}
      OPENCLAW_ACPX_GITHUB_ARGS_JSON: ${OPENCLAW_ACPX_GITHUB_ARGS_JSON:-}
      OPENCLAW_ACPX_GITEA_COMMAND: ${OPENCLAW_ACPX_GITEA_COMMAND:-}
      OPENCLAW_ACPX_GITEA_ARGS_JSON: ${OPENCLAW_ACPX_GITEA_ARGS_JSON:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - gateway-sandbox
      - gateway-mcp-gateway

  openclaw-sandbox:
    image: mwaeckerlin/openclaw:sandbox
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    environment:
      OPENCLAW_SANDBOX_SSH_PUBLIC_KEY: ${OPENCLAW_SANDBOX_SSH_PUBLIC_KEY}
      DOCKER_HOST: tcp://openclaw-dind:2375
      OPENCLAW_MCP_GATEWAY_URL: http://openclaw-mcp-gateway:4000
    volumes:
      - openclaw-workspace:/home/somebody
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    depends_on:
      openclaw-dind:
        condition: service_started
    restart: unless-stopped
    networks:
      - gateway-sandbox
      - sandbox-dind
      - sandbox-mcp-gateway

  openclaw-dind:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - openclaw-docker:/var/lib/docker
    restart: unless-stopped
    networks:
      - sandbox-dind

  openclaw-mcp-gateway:
    image: mwaeckerlin/openclaw-mcp-gateway
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    environment:
      OPENCLAW_GATEWAY_URL: http://openclaw-gateway:18789
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_DEVICE_IDENTITY: ${OPENCLAW_DEVICE_IDENTITY}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - gateway-mcp-gateway
      - sandbox-mcp-gateway

  allow-write-access:
    image: mwaeckerlin/allow-write-access
    environment:
      ALLOW_USER: "chown -R 1000:1000"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/app

networks:
  gateway-sandbox:
  sandbox-dind:
  gateway-mcp-gateway:
  sandbox-mcp-gateway:

volumes:
  openclaw-config:
  openclaw-workspace:
  openclaw-docker:
